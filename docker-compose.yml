# GUARD FILE — Execução sem arquivo especificado está bloqueada.
# DEV:  docker compose -f docker-compose.dev.yml up
# PROD: bash redeploy.sh
services:
  guard:
    image: alpine:3.20
    container_name: tribus-ai-guard
    entrypoint:
      - sh
      - -c
      - |
        echo ''
        echo '=== ERRO: docker compose sem arquivo especificado ==='
        echo 'DEV:  docker compose -f docker-compose.dev.yml up'
        echo 'PROD: bash redeploy.sh'
        echo ''
        exit 1
